version: 0.1
phases:
  pre_build:
    runtime-versions:
      nodejs: 16
    commands:
      - echo Installing NPM dependencies from package-lock.json...
      - npm i
  build:
    runtime-versions:
      nodejs: 16
    commands:
      - echo Build started on `date`
      - npm run build
artifacts:
  files:
    - '**/*'
  base-directory: build